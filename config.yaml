# ============================================================
#  LingXi Daily Agent — 统一业务配置
#  敏感信息（密钥、Token）请写入 .env，不要写在这里
# ============================================================

# 定时任务配置
scheduler:
  report_time: "18:10"          # 每天生成日报的触发时间 (HH:MM)
  confirm_timeout_min: 15       # 人工确认等待窗口（分钟）
  check_interval_sec: 10        # 任务热更新轮询间隔（秒）

# 文件路径（节假日 JSON 只读，不修改）
paths:
  holiday_file: "./holiday.json"

# 钉钉业务配置（全局默认值，可被 per-user 配置覆盖）
dingtalk:
  report_field_today: "今日工作"
  report_field_tomorrow: "明日计划"
  report_dd_from: "report"
  # 新增：日报模板名称匹配规则（支持多个关键词）
  daily_report_name_keywords:
    - "安建数科一般员工日志"
    - "每日日报"


# AI 大模型相关配置
llm:
  # 用户位置信息（用于天气等问题问答）
  # 格式：城市名 或 "经度,纬度" 或 "城市,省份,国家"
  location: "合肥市"
  # 位置上下文提示词模板，{location} 会被替换为实际位置
  location_prompt: "你已了解用户位于「{location}」，当用户询问天气、出行、本地资讯等相关问题时，可以结合该位置给出更准确的回答。"
  # 是否启用联网搜索
  # 常见 provider 配置：
  # - qwen: 阿里千问，使用 extra_body.enable_search
  # - deepseek: DeepSeek，使用 extra_body.enable_search
  # - moonshot: 月之暗面 Moonshot，使用 extra_body.search_options.enable
  # - zhipu: 智谱 GLM，使用 extra_body.search_retrieval
  # - custom: 自定义 extra_body 参数
  web_search:
    provider: "qwen"  # 默认启用阿里千问联网
  chat_system_prompt: |
    你现在是 LingXi 办公助理，一个全能的 AI 助手。你的核心本职工作是帮用户整理工作日报。
    但此时用户没有发送任务清单，而是在和你交流（提问、闲聊、查资料等）。
    请发挥你作为高级 AI 的能力，给出准确、专业、友好的回答。
    回答要求：
    1. 简明扼要，排版清晰，适合在钉钉等移动端聊天软件中阅读。
    2. 你的回答必须能真正解决用户的问题（如解释概念、提供代码、回答百科等）。
    3. 在回答的结尾，用一句话委婉且简短地提醒用户：如果需要记录今日工作，请使用格式「1. 任务描述@日期@状态」发给你。

# ── 多用户配置（需求 14/15）────────────────────────────────────
# 每个用户独立配置 template_id 和字段排序/key
# user_id: 钉钉 UserID（通过 tools/fetch_dingtalk_ids.py 获取）
# template_id: 该用户使用的日报模板 ID
# contents: 日报字段配置（sort=排序, key=字段名，与模板保持一致）
#
# 示例（填入实际值后取消注释）：
# users:
#   - user_id: "xxxxxx001"
#     template_id: "template_abc"
#     contents:
#       - sort: 1
#         key: "今日工作"
#       - sort: 2
#         key: "明日计划"
#
#   - user_id: "xxxxxx002"
#     template_id: "template_xyz"
#     contents:
#       - sort: 1
#         key: "工作内容"
#       - sort: 2
#         key: "明日安排"
users: [ ]