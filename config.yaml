# ============================================================
#  LingXi Daily Agent — 统一业务配置
#  敏感信息（密钥、Token）请写入 .env，不要写在这里
# ============================================================

# 定时任务配置
scheduler:
  report_time: "17:50"          # 每天生成日报的触发时间 (HH:MM)
  deadline_time: "18:05"        # 超时后自动代发的截止时间
  confirm_timeout_min: 1       # 人工确认等待窗口（分钟）
  check_interval_sec: 10        # 文件热更新轮询间隔（秒）

# 文件路径
paths:
  todo_file: "./todo.md"
  holiday_file: "./holiday.json"

# 钉钉业务配置
dingtalk:
  report_template_name: "工作日报"
  # 卡片消息相关
  card_logo_url: ""             # 可选：卡片头部 logo URL
  report_field_today: "今日工作"
  report_field_tomorrow: "明日计划"
  report_dd_from: "钉钉"