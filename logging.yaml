version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: '%(asctime)s - [%(levelname)s] - %(module)s - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'

handlers:
  console:
    class: logging.StreamHandler
    level: DEBUG     # <--- 调低级别，方便看调试信息
    formatter: standard
    stream: ext://sys.stderr   # <--- 【关键修复】必须输出到 stderr，绝不能用 stdout

  file:
    class: logging.handlers.TimedRotatingFileHandler
    level: INFO
    formatter: standard
    filename: logs/agent.log
    when: midnight
    interval: 1
    backupCount: 7
    encoding: utf8

root:
  level: DEBUG       # <--- 根级别也调成 DEBUG
  handlers: [ console, file ]